<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravio — Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/calculator.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="top-bar">
        <div class="top-bar-left">
          <span class="top-bar-title">📊 Calculator</span>
          <span class="top-bar-sub" id="top-sub">Add your first semester</span>
        </div>
      </div>

      <div class="screen-body">
        <!-- Semester selector — hidden until a semester exists -->
        <div id="sem-selector-wrap" class="hidden">
          <select
            class="g-sem-sel"
            id="sem-selector"
            onchange="onSemChange()"
          ></select>
        </div>

        <!-- New semester inline form -->
        <div id="new-sem-form" class="hidden new-sem-form">
          <label class="field-label">Semester label</label>
          <input
            class="g-inp new-sem-label-input"
            id="new-sem-label"
            type="text"
            placeholder="e.g. 300L First Semester 2025/26"
          />
          <div class="sem-btn-row">
            <button class="g-btn g-btn-dim" onclick="cancelNewSem()">
              Cancel
            </button>
            <button class="g-btn g-btn-p" onclick="createSemester()">
              Create →
            </button>
          </div>
        </div>

        <!-- Empty state: no semesters at all -->
        <div id="empty-state">
          <div class="empty-state">
            <span class="es-ico">📊</span>
            <div class="es-ttl">No semesters yet</div>
            <div class="es-sub">
              Create your first semester to start tracking your CGPA.
            </div>
            <button class="g-btn g-btn-p" onclick="showNewSemForm()">
              + Create first semester
            </button>
          </div>
        </div>

        <!-- Course list (shown once a semester is selected) -->
        <div id="course-area" class="hidden">
          <div class="sec-hd">Courses this semester</div>
          <div id="course-list"></div>

          <div class="add-course-link" id="add-link" onclick="addCourseRow()">
            <span>+</span> Add course
          </div>

          <!-- Live result bar -->
          <div class="result-bar" id="result-bar">
            <div class="rb-row">
              <span class="rb-lbl">Semester GPA</span>
              <span class="rb-val" id="rb-sem">0.00</span>
            </div>
            <div class="rb-divider"></div>
            <div class="rb-row">
              <span class="rb-lbl">Cumulative CGPA</span>
              <span class="rb-val" id="rb-cum">0.00</span>
            </div>
          </div>

          <button class="g-btn g-btn-p" id="save-btn" onclick="saveSemester()">
            Save semester
          </button>
        </div>
      </div>

      <nav class="bottom-nav">
        <a class="nav-item" href="home.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span class="nav-lbl">Home</span>
        </a>
        <a class="nav-item active" href="calculator.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
          <span class="nav-lbl">Calc</span>
        </a>
        <a class="nav-item" href="orbit.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
          >
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <span class="nav-lbl">Orbit</span>
        </a>
        <a class="nav-item" href="pledge.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
          >
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          <span class="nav-lbl">Pledge</span>
        </a>
        <a class="nav-item" href="profile.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
          >
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span class="nav-lbl">Profile</span>
        </a>
      </nav>
    </div>

    <script src="../js/classes/Course.js"></script>
    <script src="../js/classes/Semester.js"></script>
    <script src="../js/classes/Student.js"></script>
    <script src="../js/classes/Pledge.js"></script>
    <script src="../js/modules/storage.js"></script>
    <script src="../js/modules/calculator.js"></script>
    <script src="../js/modules/router.js"></script>
    <script src="../js/pages/calculator.js"></script>
  </body>
</html>
