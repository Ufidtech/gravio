<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravio — Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/profile.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="top-bar">
        <div class="top-bar-left">
          <span class="top-bar-title">👤 Profile</span>
          <span class="top-bar-sub">Your academic record</span>
        </div>
      </div>

      <div class="screen-body">
        <!-- ── PROFILE CARD: Read mode ── -->
        <div class="prof-hdr" id="prof-read">
          <button class="prof-edit-btn" onclick="enterEditMode()">
            ✎ Edit
          </button>
          <div class="prof-av" id="prof-av">?</div>
          <div class="prof-name" id="prof-name-display">—</div>
          <div class="prof-sub" id="prof-sub-display">—</div>
          <div style="margin-top: var(--sp-2)">
            <span class="badge badge-g" id="prof-scale-badge">5.0 Scale</span>
          </div>
        </div>

        <!-- ── PROFILE CARD: Edit mode ── -->
        <div class="prof-hdr hidden" id="prof-edit">
          <div class="prof-av" id="prof-av-edit">?</div>
          <div class="profile-edit-form">
            <label class="field-label">Full name</label>
            <input class="g-inp" id="edit-name" type="text" />

            <label class="field-label">Level</label>
            <select class="g-inp edit-level-select" id="edit-level">
              <option value="100">100 Level</option>
              <option value="200">200 Level</option>
              <option value="300">300 Level</option>
              <option value="400">400 Level</option>
              <option value="500">500 Level</option>
            </select>

            <label class="field-label">Department</label>
            <input class="g-inp" id="edit-dept" type="text" />

            <label class="field-label">University</label>
            <input class="g-inp" id="edit-uni" type="text" />

            <div class="edit-btn-row">
              <button class="g-btn g-btn-dim" onclick="cancelEdit()">
                Cancel
              </button>
              <button class="g-btn g-btn-p" onclick="saveEdit()">
                Save changes
              </button>
            </div>
          </div>
        </div>

        <!-- ── SEMESTER HISTORY ── -->
        <div class="sec-hd">Semester history</div>
        <div id="history-list"></div>

        <!-- ── SETTINGS ── -->
        <div class="sec-hd">Settings</div>
        <button class="g-btn g-btn-dim export-btn" onclick="exportAllData()">
          Export my data (JSON)
        </button>
        <button class="g-btn g-btn-d" onclick="showResetConfirm()">
          Reset Gravio
        </button>

        <!-- Inline reset confirm card — shown only after clicking Reset -->
        <div class="reset-confirm-card hidden" id="reset-card">
          <p>
            Type <strong class="reset-confirm-strong">RESET</strong> to
            permanently delete all your data. This cannot be undone.
          </p>
          <input
            class="g-inp reset-input-field"
            id="reset-input"
            type="text"
            placeholder="Type RESET here"
            oninput="toggleResetBtn()"
          />
          <div class="reset-btn-row">
            <button class="g-btn g-btn-dim" onclick="hideResetConfirm()">
              Cancel
            </button>
            <button
              class="g-btn g-btn-d"
              id="reset-confirm-btn"
              disabled
              onclick="confirmReset()"
            >
              Delete everything
            </button>
          </div>
        </div>
      </div>

      <nav class="bottom-nav">
        <a class="nav-item" href="home.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span class="nav-lbl">Home</span>
        </a>
        <a class="nav-item" href="calculator.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
          <span class="nav-lbl">Calc</span>
        </a>
        <a class="nav-item" href="orbit.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
          >
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <span class="nav-lbl">Orbit</span>
        </a>
        <a class="nav-item" href="pledge.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
          >
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          <span class="nav-lbl">Pledge</span>
        </a>
        <a class="nav-item active" href="profile.html">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
          >
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span class="nav-lbl">Profile</span>
        </a>
      </nav>
    </div>

    <script src="../js/classes/Course.js"></script>
    <script src="../js/classes/Semester.js"></script>
    <script src="../js/classes/Student.js"></script>
    <script src="../js/classes/Pledge.js"></script>
    <script src="../js/modules/storage.js"></script>
    <script src="../js/modules/calculator.js"></script>
    <script src="../js/modules/router.js"></script>
    <script src="../js/pages/profile.js"></script>
  </body>
</html>
